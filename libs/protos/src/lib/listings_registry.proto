syntax = "proto3";

package listings_registry;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

service ListingRegistryService {
  // Fetches listings for the logged-in account (Dashboard view)
  rpc GetOwnListings (GetOwnListingsRequest) returns (ListingRegistryResponse);

  // Fetches listings for admins with flexible filtering
  rpc GetAdminListings (AdminListingFilterRequest) returns (ListingRegistryResponse);
}

// ==========================================
// REQUEST MESSAGES
// ==========================================

message GetOwnListingsRequest {
  string accountId = 1;
}

message AdminListingFilterRequest {
  optional string accountId = 1;
  optional string creatorId = 2;
  optional string status = 3;
  optional string vertical = 4; // JOBS, HOUSING, SOCIAL_SUPPORT, SERVICES
  // NEW FILTERS FOR HOUSING
  optional string listingType = 5; // RENT or SALE
  optional string propertyType = 6; // APARTMENT, HOUSE, CONDO, etc.
  optional int32 minBedrooms = 7;
  optional double minPrice = 8;
  optional double maxPrice = 9;
}

// ==========================================
// RESPONSE MESSAGES
// ==========================================

message ListingRegistryResponse {
  bool success = 1;
  string message = 2;
  int32 code = 3;
  string status = 4;
  ListingRegistryData data = 5;
}

message ListingRegistryData {
  repeated JobPostProto jobs = 1;
  repeated HouseListingProto houses = 2;
  repeated ServiceOfferingProto services = 3;
  repeated SupportProgramProto support = 4;
  RegistryMetadata metadata = 5;
}

message RegistryMetadata {
  int32 totalCount = 1;
  optional int32 activeCount = 2;
  optional google.protobuf.Struct appliedFilters = 3;
}

// ==========================================
// DOMAIN MODELS (Abridged for Registry)
// ==========================================

message JobPostProto {
  string id = 1;
  string title = 2;
  string status = 3;
  float payAmount = 4;
  string locationCity = 5;
  google.protobuf.Timestamp createdAt = 6;
}

message HouseListingProto {
  string id = 1;
  string title = 2;
  string status = 3;
  float price = 4;
  string locationCity = 5;
  google.protobuf.Timestamp createdAt = 6;
  
  // NEW FIELDS FOR BETTER DISPLAY AND FILTERING
  string listingType = 7;        // RENT or SALE
  optional int32 bedrooms = 8;
  optional string locationNeighborhood = 9;
  optional string imageUrl = 10;
  optional string accountName = 11;
  
  // NEW RENTAL FIELDS
  optional int32 minimumLeaseTerm = 12;   // in months
  optional int32 maximumLeaseTerm = 13;   // in months
  optional double depositAmount = 14;     // security deposit
  optional bool isPetFriendly = 15;
  optional bool utilitiesIncluded = 16;
  
  // NEW SALE FIELDS
  optional bool isNegotiable = 17;
  optional bool titleDeedAvailable = 18;
  
  // AI TRAINING FIELDS
  optional int32 squareFootage = 19;
  optional int32 yearBuilt = 20;
  optional string propertyType = 21;      // APARTMENT, HOUSE, CONDO, etc.
}

message ServiceOfferingProto {
  string id = 1;
  string title = 2;
  float basePrice = 3;
  string locationCity = 4;
  google.protobuf.Timestamp createdAt = 5;
}

message SupportProgramProto {
  string id = 1;
  string title = 2;
  string status = 3;
  bool isFree = 4;
  string locationCity = 5;
  google.protobuf.Timestamp createdAt = 6;
}
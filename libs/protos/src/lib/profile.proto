// ======================================================
// USER PROFILE MESSAGES
// ======================================================

message UserProfileResponse {
  bool success = 1;
  string message = 2;
  string code = 3;
  UserProf data = 4;      
  ErrorPayload error = 5;  
}

message UserProf {
  AccountBase account = 1;
  UserBase user = 2;
  UserProfileMetadata profile = 3;
  string createdAt = 4;
  string updatedAt = 5;
  CompletionResponse completion = 6;
  OrganizationBase organization = 7; 
  optional ContractorData contractor = 8;
  optional JobSeekerProfileData jobSeekerProfile = 9;
  optional SkilledProfessionalProfileData skilledProfessionalProfile = 10;
  optional HousingSeekerProfileData housingSeekerProfile = 11;
  optional PropertyOwnerProfileData propertyOwnerProfile = 12;
  optional SupportBeneficiaryProfileData supportBeneficiaryProfile = 13;
  optional IntermediaryAgentProfileData intermediaryAgentProfile = 14;
}

message UserBase {
  string uuid = 1;
  string userCode = 2;
  string firstName = 3;
  string lastName = 4;
  string email = 5;
  string phone = 6;
  string status = 7;
  string roleName = 8;
}

message UserProfileMetadata {
  string bio = 1;
  string gender = 2;
  string dateOfBirth = 3;
  string nationalId = 4;
  string profileImage = 5;
}

// ======================================================
// ACCOUNT MESSAGES
// ======================================================

message AccountResponse {
  bool success = 1;
  string message = 2;
  string code = 3;
  AccountData data = 4;
  ErrorPayload error = 5;
}

message AccountData {
  string uuid = 1;
  string accountCode = 2;
  optional string name = 3;
  string type = 4;
  string status = 5;
  string userRole = 6;
  repeated string activeProfiles = 7;
  bool isVerified = 8;
  repeated string verifiedFeatures = 9;
  optional IndividualProfileData individualProfile = 10;
  optional JobSeekerProfileData jobSeekerProfile = 11;
  optional SkilledProfessionalProfileData skilledProfessionalProfile = 12;
  optional HousingSeekerProfileData housingSeekerProfile = 13;
  optional PropertyOwnerProfileData propertyOwnerProfile = 14;
  optional SupportBeneficiaryProfileData supportBeneficiaryProfile = 15;
  optional IntermediaryAgentProfileData intermediaryAgentProfile = 16;
  CompletionResponse completion = 17;
  string createdAt = 18;
  string updatedAt = 19;
  repeated UserBase users = 20;  // ← ADD THIS - users array for the account
}

message IndividualProfileData {
  string accountUuid = 1;
  string firstName = 2;
  string lastName = 3;
  optional string bio = 4;
  optional string gender = 5;
  optional string dateOfBirth = 6;
  optional string nationalId = 7;
  optional string profileImage = 8;
  optional string businessName = 9;
  optional string logo = 10;
  optional bool operatesAsBusiness = 11;
  optional string coverPhoto = 12;
}

// ======================================================
// ORGANIZATION MESSAGES
// ======================================================

message OrganizationBase {
  string id = 1;
  string uuid = 2;
  string name = 3;
  string orgCode = 4;
  string verificationStatus = 5;
  string officialEmail = 6; 
}

message OrgProfileResponse {
  bool success = 1;
  string message = 2;
  string code = 3;
  OrgProfileData data = 4;      
  ErrorPayload error = 5;
}

message OrgProfileData {
  string id = 1;
  string uuid = 2;

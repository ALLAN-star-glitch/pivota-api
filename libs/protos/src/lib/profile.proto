syntax = "proto3";

package profile;

// ======================================================
// SERVICE DEFINITIONS
// ======================================================

service ProfileService {
  // CREATE - INDIVIDUAL
  rpc CreateIndividualAccountWithProfiles(CreateIndividualAccountWithProfilesRequest) returns (AccountResponse);
  rpc CreateJobSeekerProfile(CreateJobSeekerProfileRequest) returns (JobSeekerProfileResponse);
  rpc CreateSkilledProfessionalProfile(CreateSkilledProfessionalProfileRequest) returns (SkilledProfessionalProfileResponse);
  rpc CreateIntermediaryAgentProfile(CreateIntermediaryAgentProfileRequest) returns (IntermediaryAgentProfileResponse);
  rpc CreateHousingSeekerProfile(CreateHousingSeekerProfileRequest) returns (HousingSeekerProfileResponse);
  rpc CreatePropertyOwnerProfile(CreatePropertyOwnerProfileRequest) returns (PropertyOwnerProfileResponse);
  rpc CreateSupportBeneficiaryProfile(CreateSupportBeneficiaryProfileRequest) returns (SupportBeneficiaryProfileResponse);
  
  // CREATE - ORGANIZATION
  rpc CreateOrganizationAccountWithProfiles(CreateOrganizationAccountWithProfilesRequest) returns (OrgProfileResponse);
  rpc CreateEmployerProfile(CreateEmployerProfileRequest) returns (EmployerProfileResponse);
  rpc CreateSocialServiceProviderProfile(CreateSocialServiceProviderProfileRequest) returns (SocialServiceProviderProfileResponse);
  rpc CreateOrganizationPropertyOwnerProfile(CreateOrganizationPropertyOwnerProfileRequest) returns (PropertyOwnerProfileResponse);
  rpc CreateOrganizationSkilledProfessionalProfile(CreateOrganizationSkilledProfessionalProfileRequest) returns (SkilledProfessionalProfileResponse);
  rpc CreateOrganizationIntermediaryAgentProfile(CreateOrganizationIntermediaryAgentProfileRequest) returns (IntermediaryAgentProfileResponse);

  // READ (Identity & Profile)
  rpc GetMyProfile(GetMyProfileRequest) returns (UserProfileResponse);
  rpc GetUserProfileByUuid(GetUserByUuidRequest) returns (UserProfileResponse);
  rpc GetUserProfileByUserCode(GetUserByUserCodeRequest) returns (UserProfileResponse);
  rpc GetUserProfileByEmail(GetUserByEmailRequest) returns (UserProfileResponse);
  rpc GetAccountByUuid(GetAccountByUuidRequest) returns (AccountResponse);
  rpc GetAllUsers(Empty) returns (UserListResponse);
  
  // READ (Organizations)
  rpc GetOrganizationsByType(GetOrganizationsByTypeRequest) returns (OrgListResponse);
  rpc GetOrganizationByUuid(GetOrgByUuidRequest) returns (OrgProfileResponse);
  rpc GetOrganizationByAccountUuid(GetOrgByAccountUuidRequest) returns (OrgProfileResponse);

  // UPDATE - INDIVIDUAL
  rpc UpdateUserProfile(UpdateFullUserProfileRequest) returns (UserProfileResponse);
  rpc UpdateJobSeekerProfile(UpdateJobSeekerProfileRequest) returns (JobSeekerProfileResponse);
  rpc UpdateSkilledProfessionalProfile(UpdateSkilledProfessionalProfileRequest) returns (SkilledProfessionalProfileResponse);
  rpc UpdateHousingSeekerProfile(UpdateHousingSeekerProfileRequest) returns (HousingSeekerProfileResponse);
  rpc UpdatePropertyOwnerProfile(UpdatePropertyOwnerProfileRequest) returns (PropertyOwnerProfileResponse);
  rpc UpdateSupportBeneficiaryProfile(UpdateSupportBeneficiaryProfileRequest) returns (SupportBeneficiaryProfileResponse);
  rpc UpdateIntermediaryAgentProfile(UpdateIntermediaryAgentProfileRequest) returns (IntermediaryAgentProfileResponse);
  
  // UPDATE - ORGANIZATION
  rpc UpdateOrganizationProfile(UpdateOrgProfileRequest) returns (OrgProfileResponse);
  rpc UpdateEmployerProfile(UpdateEmployerProfileRequest) returns (EmployerProfileResponse);
  rpc UpdateSocialServiceProviderProfile(UpdateSocialServiceProviderProfileRequest) returns (SocialServiceProviderProfileResponse);
  rpc UpdateOrganizationPropertyOwnerProfile(UpdateOrganizationPropertyOwnerProfileRequest) returns (PropertyOwnerProfileResponse);
  rpc UpdateOrganizationSkilledProfessionalProfile(UpdateOrganizationSkilledProfessionalProfileRequest) returns (SkilledProfessionalProfileResponse);
  rpc UpdateOrganizationIntermediaryAgentProfile(UpdateOrganizationIntermediaryAgentProfileRequest) returns (IntermediaryAgentProfileResponse);

  // REMOVE PROFILE
  rpc RemoveProfile(RemoveProfileRequest) returns (BaseResponse);

  // MEMBERSHIP
  rpc AddOrganizationMember(AddOrgMemberRequest) returns (BaseResponse);
  
  // ======================================================
  // INVITATION MANAGEMENT
  // ======================================================
  rpc InviteMember(InviteMemberRequest) returns (InviteMemberResponse);
  rpc VerifyInvitation(VerifyInvitationRequest) returns (InvitationVerificationResponse);
  rpc AcceptInvitation(AcceptInvitationRequest) returns (AcceptInvitationResponse);
  rpc GetOrganizationInvitations(GetOrganizationInvitationsRequest) returns (InvitationListResponse);
  rpc ResendInvitation(ResendInvitationRequest) returns (BaseResponse);
  rpc CancelInvitation(CancelInvitationRequest) returns (BaseResponse);
  rpc CheckInvitationStatus(CheckInvitationStatusRequest) returns (CheckInvitationStatusResponse);



  // ======================================================
  // MEDIA SERVICE METHODS
  // ======================================================
  
  // Profile Picture
  rpc UploadProfilePicture(UploadProfilePictureRequest) returns (MediaUploadResponse);
  rpc UploadLogo(UploadLogoRequest) returns (MediaUploadResponse);
  rpc UploadCoverPhoto(UploadCoverPhotoRequest) returns (MediaUploadResponse);
  
  // CV / Resume
  rpc UploadCV(UploadCVRequest) returns (MediaUploadResponse);
  rpc GetCV(GetCVRequest) returns (GetCVResponse);
  rpc DownloadCV(DownloadCVRequest) returns (FileDownloadResponse);
  
  // Job Seeker Portfolio
  rpc UploadJobSeekerPortfolioItems(UploadPortfolioRequest) returns (MediaUploadMultipleResponse);
  rpc GetJobSeekerPortfolioItems(GetPortfolioRequest) returns (PortfolioResponse);
  rpc GetJobSeekerPortfolioItem(GetPortfolioItemRequest) returns (PortfolioItemResponse);
  rpc GetJobSeekerPortfolioItemByPath(GetPortfolioItemByPathRequest) returns (PortfolioItemResponse);
  rpc DeleteJobSeekerPortfolioItem(DeletePortfolioItemRequest) returns (BaseResponse);
  rpc BulkDeleteJobSeekerPortfolioItems(BulkDeletePortfolioRequest) returns (BulkDeleteResponse);
  rpc BulkDownloadJobSeekerPortfolioItems(BulkDownloadPortfolioRequest) returns (ZipDownloadResponse);
  
  // Skilled Professional Portfolio
  rpc UploadSkilledProfessionalPortfolioItems(UploadPortfolioRequest) returns (MediaUploadMultipleResponse);
  rpc GetSkilledProfessionalPortfolioItems(GetPortfolioRequest) returns (PortfolioResponse);
  rpc GetSkilledProfessionalPortfolioItem(GetPortfolioItemRequest) returns (PortfolioItemResponse);
  rpc GetSkilledProfessionalPortfolioItemByPath(GetPortfolioItemByPathRequest) returns (PortfolioItemResponse);
  rpc DeleteSkilledProfessionalPortfolioItem(DeletePortfolioItemRequest) returns (BaseResponse);
  rpc BulkDeleteSkilledProfessionalPortfolioItems(BulkDeletePortfolioRequest) returns (BulkDeleteResponse);
  rpc BulkDownloadSkilledProfessionalPortfolioItems(BulkDownloadPortfolioRequest) returns (ZipDownloadResponse);
  
  // Certifications
  rpc UploadCertifications(UploadPortfolioRequest) returns (MediaUploadMultipleResponse);
  rpc GetCertifications(GetCertificationsRequest) returns (CertificationResponse);
  rpc GetCertificationByPath(GetCertificationByPathRequest) returns (GetCertificationByPathResponse);
  rpc DownloadCertificationByPath(DownloadCertificationByPathRequest) returns (FileDownloadResponse);
  rpc DeleteCertification(DeleteCertificationRequest) returns (BaseResponse);
  rpc BulkDeleteCertifications(BulkDeleteCertificationsRequest) returns (BulkDeleteResponse);
  rpc BulkDownloadCertifications(BulkDownloadCertificationsRequest) returns (ZipDownloadResponse);
  
  // Generic
  rpc DeleteFile(DeleteFileRequest) returns (BaseResponse);
}

// ======================================================
// INDIVIDUAL PROFILE DATA TYPES
// ======================================================

message JobSeekerProfileData {
  optional string headline = 1;
  optional bool isActivelySeeking = 2;
  repeated string skills = 3;
  repeated string industries = 4;
  repeated string jobTypes = 5;
  optional string seniorityLevel = 6;
  optional string noticePeriod = 7;           // Add this
  optional double expectedSalary = 8;
  repeated string workAuthorization = 9;
  optional string cvUrl = 10;
  repeated string portfolioImages = 11;
  optional string linkedInUrl = 12;
  optional string githubUrl = 13;
  optional string portfolioUrl = 14;
  optional bool hasAgent = 15;
  optional string agentUuid = 16;
}

message SkilledProfessionalProfileData {
  optional string title = 1;
  optional string profession = 2;
  repeated string specialties = 3;
  repeated string serviceAreas = 4;
  optional int32 yearsExperience = 5;
  optional string licenseNumber = 6;
  optional string insuranceInfo = 7;
  optional double hourlyRate = 8;
  optional double dailyRate = 9;
  optional string paymentTerms = 10;
  optional bool availableToday = 11;
  optional bool availableWeekends = 12;
  optional bool emergencyService = 13;
  repeated string portfolioImages = 14;
  repeated string certifications = 15;
}

message IntermediaryAgentProfileData {
  string agentType = 1;
  repeated string specializations = 2;
  repeated string serviceAreas = 3;
  optional string licenseNumber = 4;
  optional string licenseBody = 5;
  optional int32 yearsExperience = 6;
  optional string agencyName = 7;
  optional string agencyUuid = 8;
  optional double commissionRate = 9;
  optional string feeStructure = 10;
  optional double minimumFee = 11;
  optional string typicalFee = 12;
  optional string about = 13;
  optional string profileImage = 14;
  optional string contactEmail = 15;
  optional string contactPhone = 16;
  optional string website = 17;
  map<string, string> socialLinks = 18;
  repeated string clientTypes = 19;
}

message HousingSeekerProfileData {
  optional int32 minBedrooms = 1;
  optional int32 maxBedrooms = 2;
  optional double minBudget = 3;
  optional double maxBudget = 4;
  repeated string preferredTypes = 5;
  repeated string preferredCities = 6;
  repeated string preferredNeighborhoods = 7;
  optional string moveInDate = 8;
  optional string leaseDuration = 9;
  optional int32 householdSize = 10;
  optional bool hasPets = 11;
  optional string petDetails = 12;
  optional double latitude = 13;
  optional double longitude = 14;
  optional int32 searchRadiusKm = 15;
  optional bool hasAgent = 16;
  optional string agentUuid = 17;
  // NEW FIELDS
  optional string searchType = 18;           // "RENT", "BUY", "BOTH"
  optional bool isLookingForRental = 19;     // true/false
  optional bool isLookingToBuy = 20;         // true/false
}

message SupportBeneficiaryProfileData {
  repeated string needs = 1;
  repeated string urgentNeeds = 2;
  optional int32 familySize = 3;
  optional int32 dependents = 4;
  optional string householdComposition = 5;
  repeated string vulnerabilityFactors = 6;
  optional string city = 7;
  optional string neighborhood = 8;
  optional double latitude = 9;
  optional double longitude = 10;
  optional string landmark = 11;
  optional bool prefersAnonymity = 12;
  repeated string languagePreference = 13;
  optional bool consentToShare = 14;
  optional string referredBy = 15;
  optional string referredByUuid = 16;
  optional string caseWorkerUuid = 17;
}


message PropertyOwnerProfileData {
  optional bool isProfessional = 1;
  optional string licenseNumber = 2;
  optional string companyName = 3;
  optional int32 yearsInBusiness = 4;
  repeated string preferredPropertyTypes = 5;
  repeated string serviceAreas = 6;
  optional bool usesAgent = 7;
  optional string managingAgentUuid = 8;
  
  // --- Fields for INDIVIDUAL accounts ---
  optional int32 propertyCount = 9;
  repeated string propertyTypes = 10;
  optional string propertyPurpose = 11;  // "PRIMARY", "INVESTMENT", "BOTH"
  // NEW FIELDS
  optional string listingType = 12;       // "RENT", "SALE", "BOTH"
  optional bool isListingForRent = 13;    // true/false
  optional bool isListingForSale = 14;    // true/false
}

// ======================================================
// ORGANIZATION PROFILE DATA TYPES
// ======================================================

message EmployerProfileData {
  optional string companyName = 1;
  optional string industry = 2;
  optional string companySize = 3;
  optional int32 foundedYear = 4;
  optional string description = 5;
  optional string logo = 6;
  repeated string preferredSkills = 7;
  optional string remotePolicy = 8;
  optional bool worksWithAgents = 9;
  repeated string preferredAgents = 10;
  
  // --- Fields for INDIVIDUAL accounts ---
  optional string businessName = 11;
  optional bool isRegistered = 12;
  optional int32 yearsExperience = 13;
}

message SocialServiceProviderProfileData {
  string providerType = 1;
  repeated string servicesOffered = 2;
  repeated string targetBeneficiaries = 3;
  repeated string serviceAreas = 4;
  optional string about = 5;
  optional string website = 6;
  optional string contactEmail = 7;
  optional string contactPhone = 8;
  optional string officeHours = 9;
  optional string physicalAddress = 10;
  optional int32 peopleServed = 11;
  optional int32 yearEstablished = 12;
  optional bool acceptsDonations = 13;
  optional bool needsVolunteers = 14;
  optional string donationInfo = 15;
  optional string volunteerNeeds = 16;
  
  // --- Fields for INDIVIDUAL accounts ---
  optional string operatingName = 17;
  optional int32 yearsExperience = 18;
  repeated string qualifications = 19;
  optional string availability = 20;
}

// ======================================================
// REQUEST MESSAGES
// ======================================================

/**
 * Individual Signup - Single primary purpose (UI Screen 6A)
 */
message CreateIndividualAccountWithProfilesRequest {
  string accountType = 1;
  string email = 2;
  string password = 3;
  optional string phone = 4;
  optional string planSlug = 5;
  string otpCode = 6;
  string firstName = 7;
  string lastName = 8;
  optional string profileImage = 9;
  optional string primaryPurpose = 10;
  oneof profileData {
    JobSeekerProfileData jobSeekerData = 11;
    SkilledProfessionalProfileData skilledProfessionalData = 12;
    IntermediaryAgentProfileData intermediaryAgentData = 13;
    HousingSeekerProfileData housingSeekerData = 14;
    SupportBeneficiaryProfileData supportBeneficiaryData = 15;
    EmployerProfileData employerData = 16;                    // ADD THIS for HIRE_EMPLOYEES
    PropertyOwnerProfileData propertyOwnerData = 17;          // ADD THIS for LIST_PROPERTIES
  }
  repeated ProfileToCreate profiles = 18;                     // Update number from 16 to 18
  optional bool isBusiness = 19;
  optional string businessType = 20;      // "FOR_PROFIT", "NON_PROFIT", "GOVERNMENT"
  optional string businessName = 21;
  optional string logo = 22;
  optional string coverPhoto = 23;
  optional bool skipEventEmission = 24; // NEW FIELD to control event emission
}

message ProfileToCreate {
  string type = 1;
  string data = 2;
}

// Individual Profile Creation Requests
message CreateJobSeekerProfileRequest {
  string accountUuid = 1;
  JobSeekerProfileData data = 2;
}

message CreateSkilledProfessionalProfileRequest {
  string accountUuid = 1;
  SkilledProfessionalProfileData data = 2;
}

message CreateIntermediaryAgentProfileRequest {
  string accountUuid = 1;
  IntermediaryAgentProfileData data = 2;
}

message CreateHousingSeekerProfileRequest {
  string accountUuid = 1;
  HousingSeekerProfileData data = 2;
}

message CreatePropertyOwnerProfileRequest {
  string accountUuid = 1;
  PropertyOwnerProfileData data = 2;
}

message CreateSupportBeneficiaryProfileRequest {
  string accountUuid = 1;
  SupportBeneficiaryProfileData data = 2;
}

// Organization Profile Creation Requests
message CreateEmployerProfileRequest {
  string accountUuid = 1;
  EmployerProfileData data = 2;
}

message CreateSocialServiceProviderProfileRequest {
  string accountUuid = 1;
  SocialServiceProviderProfileData data = 2;
}

message CreateOrganizationPropertyOwnerProfileRequest {
  string accountUuid = 1;
  PropertyOwnerProfileData data = 2;
}

message CreateOrganizationSkilledProfessionalProfileRequest {
  string accountUuid = 1;
  SkilledProfessionalProfileData data = 2;
}

message CreateOrganizationIntermediaryAgentProfileRequest {
  string accountUuid = 1;
  IntermediaryAgentProfileData data = 2;
}

/**
 * Organization Signup - Multiple purposes (UI Screen 7 - Checkboxes)
 */
message CreateOrganizationAccountWithProfilesRequest {
  string accountType = 1;
  string adminUserUuid = 2;
  string email = 3;
  string phone = 4;
  string adminFirstName = 5;
  string adminLastName = 6;
  optional string adminProfileImage = 7;
  string organizationName = 8;
  string organizationType = 9;
  string officialEmail = 10;
  string officialPhone = 11;
  string physicalAddress = 12;
  optional string registrationNo = 13;
  optional string kraPin = 14;
  optional string website = 15;
  optional string about = 16;
  optional string logo = 17;
  optional string planSlug = 18;
  repeated string purposes = 19;
  map<string, OrganizationProfileDataEntry> profileData = 20;
  optional bool isBusiness = 21;      // Should always be true for organizations
  optional string businessType = 22;  // "FOR_PROFIT", "NON_PROFIT", "GOVERNMENT"
  optional string coverPhoto = 23;
}

message OrganizationProfileDataEntry {
  oneof data {
    EmployerProfileData employerData = 1;
    PropertyOwnerProfileData propertyOwnerData = 2;
    SkilledProfessionalProfileData skilledProfessionalData = 3;
    SocialServiceProviderProfileData socialServiceProviderData = 4;
    IntermediaryAgentProfileData intermediaryAgentData = 5;
  }
}


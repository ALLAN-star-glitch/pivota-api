syntax = "proto3";

package contractors_pricing;

// ===================================================
// SERVICE DEFINITION
// ===================================================
service ContractorsPricingService {
  // Used by the Admin Dashboard to create/update rules
  rpc UpsertRule (CreatePriceUnitRuleRequest) returns (BasePriceRuleResponse);
  
  // Used by the Mobile/Web Frontend to get validation rules for the form
  rpc GetPricingMetadata (GetPricingMetadataRequest) returns (PricingMetadataResponse);
  
  // Admin view for all rules
  rpc GetAllRules (Empty) returns (ListPriceRulesResponse);
  
  // Toggle rule status
  rpc ToggleRule (ToggleRuleRequest) returns (BasePriceRuleResponse);
  
  // ===================================================
  // NEW: Get pricing units by category
  // ===================================================
  // Used by the Mobile/Web Frontend to populate dropdown when selecting a category
  rpc GetPricingUnitsByCategory (GetPricingUnitsByCategoryRequest) returns (PricingUnitsByCategoryResponse);
}

// ===================================================
// SHARED MESSAGES
// ===================================================
message Empty {}

message ErrorPayload {
  string code = 1;
  string message = 2;
  string details = 3;
}

// ===================================================
// ENTITIES
// ===================================================
message PriceUnitRule {
  string id = 1;
  string vertical = 2;
  string unit = 3;
  string currency = 4;
  optional string categorySlug = 5; 
  
  double minPrice = 6;
  optional double maxPrice = 7;
  
  bool isExperienceRequired = 8;
  bool isNotesRequired = 9;
  bool isActive = 10;
  string createdAt = 11;
}

message PricingMetadataItem {
  string unit = 1;
  string currency = 2;
  optional string categorySlug = 3;
  double min = 4;
  optional double max = 5;
  bool experienceRequired = 6;
  bool notesRequired = 7;
}

// ===================================================
// REQUEST MESSAGES
// ===================================================
message CreatePriceUnitRuleRequest {
  string vertical = 1;
  string unit = 2;
  string currency = 3;
  optional string categorySlug = 4;
  double minPrice = 5;
  optional double maxPrice = 6;
  bool isExperienceRequired = 7;
  bool isNotesRequired = 8;
  bool isActive = 9;
}

message GetPricingMetadataRequest {}

message ToggleRuleRequest {
  string id = 1;
  bool active = 2;
}

// ===================================================
// NEW: Get Pricing Units By Category
// ===================================================
message GetPricingUnitsByCategoryRequest {
  string categoryId = 1;
}

message PricingUnitOption {
  string unit = 1;
  string label = 2;
  string description = 3;
  double minPrice = 4;
  optional double maxPrice = 5;
  bool experienceRequired = 6;
  bool notesRequired = 7;
  string currency = 8;
}

message PricingUnitsByCategoryData {
  string categoryId = 1;
  string categoryName = 2;
  string vertical = 3;
  repeated PricingUnitOption allowedUnits = 4;
}

message PricingUnitsByCategoryResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  PricingUnitsByCategoryData data = 4;
  ErrorPayload error = 5;
}

// ===================================================
// RESPONSE MESSAGES
// ===================================================
message BasePriceRuleResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  PriceUnitRule data = 4;
  ErrorPayload error = 5;
}

message ListPriceRulesResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  repeated PriceUnitRule data = 4;
  ErrorPayload error = 5;
}

message PricingMetadataResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  PricingMetadataData data = 4; 
  ErrorPayload error = 5;
}

message PricingMetadataData {
  map<string, VerticalRuleList> verticals = 1;
}

message VerticalRuleList {
  repeated PricingMetadataItem rules = 1;
}
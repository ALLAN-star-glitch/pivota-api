// protos/housing-training-data.proto
syntax = "proto3";

package housing_training_data;

import "google/protobuf/struct.proto";

// Service definition
service HousingTrainingDataService {
  // Get comprehensive training dataset
  rpc GetTrainingDataset (TrainingDataParams) returns (TrainingDatasetResponse);
  
  // Get dataset statistics
  rpc GetDatasetStats (StatsParams) returns (DatasetStatsResponse);
  
  // Export training data
  rpc ExportTrainingData (ExportRequest) returns (ExportResponse);
  
  // Get sample data
  rpc GetSampleData (SampleParams) returns (SampleResponse);
}

// ==================== REQUEST MESSAGES ====================

message TrainingDataParams {
  optional string start_date = 1;
  optional string end_date = 2;
  optional int32 limit = 3;
  optional bool include_labels = 4;
  optional bool only_labeled = 5;
  optional bool exclude_bots = 6;
  repeated string user_ids = 7;
  optional int32 min_dwell_time = 8;
  optional bool include_feature_importance = 9;
  optional double min_overall_match_score = 10;
  repeated string listing_types = 11;
  repeated string property_types = 12;
  string account_uuid = 13;
}

message StatsParams {
  optional string start_date = 1;
  optional string end_date = 2;
  string account_uuid = 3;
}

message SampleParams {
  optional int32 size = 1;
  optional bool include_labels = 2;
  string account_uuid = 3;
}

message ExportRequest {
  TrainingDataParams params = 1;
  string format = 2;
}

// ==================== RESPONSE MESSAGES ====================

message TrainingDatasetResponse {
  bool success = 1;
  string message = 2;
  string code = 3;
  TrainingDataset data = 4;
}

message DatasetStatsResponse {
  bool success = 1;
  string message = 2;
  string code = 3;
  DatasetStats data = 4;
}

message ExportResponse {
  bool success = 1;
  string message = 2;
  string code = 3;
  ExportData data = 4;
}

message SampleResponse {
  bool success = 1;
  string message = 2;
  string code = 3;
  SampleData data = 4;
}

// ==================== TRAINING DATASET STRUCTURES ====================

message TrainingDataset {
  Metadata metadata = 1;
  FeatureSet features = 2;
  LabelSet labels = 3;
  repeated TrainingSample samples = 4;
  optional google.protobuf.Struct feature_importance = 5;
}

message Metadata {
  string exported_at = 1;
  int32 total_records = 2;
  DateRange date_range = 3;
  string version = 4;
  google.protobuf.Struct filters = 5;
}

message DateRange {
  string from = 1;
  string to = 2;
}

message FeatureSet {
  repeated string names = 1;
  map<string, string> types = 2;
  map<string, string> description = 3;
  repeated google.protobuf.Struct data = 4;
}

message LabelSet {
  repeated string names = 1;
  map<string, string> types = 2;
  map<string, string> description = 3;
  repeated google.protobuf.Struct data = 4;
}

message TrainingSample {
  string id = 1;
  string user_uuid = 2;
  string listing_id = 3;
  string timestamp = 4;
  google.protobuf.Struct features = 5;
  optional google.protobuf.Struct labels = 6;
}

// ==================== DATASET STATS STRUCTURES ====================

message DatasetStats {
  int32 total_events = 1;
  DateRange date_range = 2;
  int32 unique_users = 3;
  int32 unique_listings = 4;
  LabelDistribution label_distribution = 5;
  int32 bot_traffic = 6;
  double average_dwell_time = 7;
  PriceRange price_range = 8;
  MatchScores match_scores = 9;
  map<string, int32> temporal_distribution = 10;
  map<int32, int32> hour_distribution = 11;
  map<int32, int32> day_distribution = 12;
  // NEW: Tracking statistics
  optional TrackingStats tracking_stats = 13;
}

message LabelDistribution {
  int32 clicked = 1;
  int32 saved = 2;
  int32 contacted = 3;
  int32 scheduled_viewing = 4;
  int32 completed_viewing = 5;
  int32 any_interaction = 6;
}

message PriceRange {
  double min = 1;
  double max = 2;
  double avg = 3;
}

message MatchScores {
  double avg_overall_match_score = 1;
  double avg_price_to_budget_ratio = 2;
  double avg_location_distance = 3;
}

// ==================== NEW: TRACKING STATS ====================
message TrackingStats {
  int32 total_views = 1;
  int32 total_scheduled_viewings = 2;
  int32 total_completed_viewings = 3;
  int32 unique_viewers = 4;
  int32 unique_schedulers = 5;
  int32 unique_attending_users = 6;
  double avg_view_duration = 7;
  double avg_scroll_depth = 8;
  map<string, int32> viewing_status_distribution = 9;  // SCHEDULED, COMPLETED, CANCELLED, NO_SHOW
}

// ==================== EXPORT STRUCTURES ====================

message ExportData {
  string format = 1;
  string data = 2;
  string filename = 3;
}

// ==================== SAMPLE STRUCTURES ====================

message SampleData {
  repeated TrainingSample sample = 1;
  FeatureSet feature_schema = 2;
  LabelSet label_schema = 3;
}
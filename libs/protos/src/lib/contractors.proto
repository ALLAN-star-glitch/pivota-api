syntax = "proto3";

package contractors;

// ===================================================
// SERVICE DEFINITION
// ===================================================
service ContractorsService {
  rpc CreateServiceOffering (CreateServiceOfferingRequest) returns (BaseServiceOfferingResponse);
  rpc GetOfferingsByVertical (GetOfferingsByVerticalRequest) returns (ListServiceOfferingsResponse);
  rpc GetOfferingsByAccount (GetOfferingsByAccountRequest) returns (ListServiceOfferingsResponse);
  rpc GetOfferingsByProfessional (GetOfferingsByProfessionalRequest) returns (ListServiceOfferingsResponse);
  rpc GetOfferingById (GetOfferingByIdRequest) returns (BaseServiceOfferingResponse);
  rpc UpdateServiceOffering (UpdateServiceOfferingRequest) returns (BaseServiceOfferingResponse);
  rpc DeleteServiceOffering (DeleteServiceOfferingRequest) returns (BaseResponse);
  rpc GetOfferingsByCategory (GetOfferingsByCategoryRequest) returns (ListServiceOfferingsResponse); 
}

// ===================================================
// SHARED MESSAGES
// ===================================================
message ErrorPayload {
  string code = 1;
  string message = 2;
  string details = 3;
}

message DayAvailability {
  string day = 1;      // e.g., "Monday"
  string open = 2;     // e.g., "08:00"
  string close = 3;    // e.g., "17:00"
  bool isClosed = 4;   
}

message BaseResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  ErrorPayload error = 4;
}

// ===================================================
// ENTITIES
// ===================================================
message ServiceOffering {
  string id = 1;
  string externalId = 2;
  
  // Identity Pillar
  string creatorId = 3;
  string accountId = 4;
  string skilledProfessionalId = 5;  // Link to profile
  
  // Denormalized fields
  string professionalName = 6;
  string professionalAvatar = 7;
  bool isVerified = 8;
  
  string title = 9;
  string description = 10;
  string categoryId = 11;
  string categoryName = 12;
  // REMOVED: repeated string verticals = 13; - use category.vertical instead
  
  double basePrice = 13;  // Renumbered from 14
  string priceUnit = 14;  // Renumbered from 15
  string currency = 15;   // Renumbered from 16
  
  string locationCity = 16;           // Renumbered from 17
  string locationNeighborhood = 17;   // Renumbered from 18
  
  repeated DayAvailability availability = 18;  // Renumbered from 19
  
  int32 yearsExperience = 19;  // Renumbered from 20
  double hourlyRate = 20;      // Renumbered from 21
  repeated string serviceAreas = 21;  // Renumbered from 22
  
  string status = 22;  // Renumbered from 23
  string expiresAt = 23;  // Renumbered from 24
  
  double averageRating = 24;  // Renumbered from 25
  int32 reviewCount = 25;     // Renumbered from 26
  
  string createdAt = 26;  // Renumbered from 27
  string updatedAt = 27;  // Renumbered from 28
  
  // ADD: vertical from category (for convenience)
  string vertical = 28;  // Derived from category.vertical
}

// ===================================================
// REQUEST MESSAGES
// ===================================================
message CreateServiceOfferingRequest {
  // Identity (from Gateway JWT)
  string creatorId = 1;
  string accountId = 2;
  string skilledProfessionalId = 3;

  string title = 4;
  string description = 5;
  string categoryId = 6;
  // REMOVED: repeated string verticals = 7;
  
  double basePrice = 7;  // Renumbered from 8
  string priceUnit = 8;  // Renumbered from 9
  string currency = 9;   // Renumbered from 10
  
  string locationCity = 10;           // Renumbered from 11
  string locationNeighborhood = 11;   // Renumbered from 12
  
  int32 yearsExperience = 12;  // Renumbered from 13
  string additionalNotes = 13;  // Renumbered from 14
  
  repeated DayAvailability availability = 14;  // Renumbered from 15
}

message GetOfferingsByVerticalRequest {
  string vertical = 1;
  optional string city = 2;
  optional string categoryId = 3;
  optional double minPrice = 4;
  optional double maxPrice = 5;
  optional double minRating = 6;
  optional bool isVerified = 7;
  optional string sortBy = 8;
  optional int32 limit = 9;
  optional int32 offset = 10;
}

message GetOfferingsByAccountRequest {
  string accountId = 1;
}

message GetOfferingsByProfessionalRequest {
  string professionalId = 1;
}

message GetOfferingByIdRequest {
  string id = 1;
}

message UpdateServiceOfferingRequest {
  string id = 1;
  optional string title = 2;
  optional string description = 3;
  optional double basePrice = 4;
  optional string priceUnit = 5;
  optional string locationCity = 6;
  optional string locationNeighborhood = 7;
  repeated DayAvailability availability = 8;
  string userId = 9;  // For permission check
}

message DeleteServiceOfferingRequest {
  string id = 1;
  string userId = 2;
}

// ===================================================
// RESPONSE MESSAGES
// ===================================================
message BaseServiceOfferingResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  ServiceOffering data = 4; 
  ErrorPayload error = 5;
}

message ListServiceOfferingsResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  repeated ServiceOffering data = 4;
  PaginationInfo pagination = 5;
  ErrorPayload error = 6;
}

message PaginationInfo {
  int32 total = 1;
  int32 limit = 2;
  int32 offset = 3;
  bool hasMore = 4;
}

message GetOfferingsByCategoryRequest {
  string categoryId = 1;
  optional int32 limit = 2;
  optional int32 offset = 3;
  optional string city = 4;
  optional double minPrice = 5;
  optional double maxPrice = 6;
}
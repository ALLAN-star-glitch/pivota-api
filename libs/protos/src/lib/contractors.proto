syntax = "proto3";

package contractors;

// ===================================================
// SERVICE DEFINITION
// ===================================================
service ContractorsService {
  // Service Offering Methods
  rpc CreateServiceOffering (CreateServiceOfferingRequest) returns (BaseServiceOfferingResponse);
  rpc GetOfferingsByVertical (GetOfferingsByVerticalRequest) returns (ListServiceOfferingsResponse);
  rpc GetOfferingsByAccount (GetOfferingsByAccountRequest) returns (ListServiceOfferingsResponse);
  rpc GetOfferingsByProfessional (GetOfferingsByProfessionalRequest) returns (ListServiceOfferingsResponse);
  rpc GetOfferingById (GetOfferingByIdRequest) returns (BaseServiceOfferingResponse);
  rpc UpdateServiceOffering (UpdateServiceOfferingRequest) returns (BaseServiceOfferingResponse);
  rpc DeleteServiceOffering (DeleteServiceOfferingRequest) returns (BaseResponse);
  rpc GetOfferingsByCategory (GetOfferingsByCategoryRequest) returns (ListServiceOfferingsResponse);
}

// ===================================================
// SHARED MESSAGES
// ===================================================
message ErrorPayload {
  string code = 1;
  string message = 2;
  string details = 3;
}

message DayAvailability {
  string day = 1;      // e.g., "Monday"
  string open = 2;     // e.g., "08:00"
  string close = 3;    // e.g., "17:00"
  bool isClosed = 4;   
}

message BaseResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  ErrorPayload error = 4;
}

// ===================================================
// ENTITIES
// ===================================================
message ServiceOffering {
  string id = 1;
  string externalId = 2;
  
  // Identity Pillar
  string creatorId = 3;
  string accountId = 4;
  string skilledProfessionalId = 5;
  
  // Denormalized fields
  string professionalName = 6;
  string professionalAvatar = 7;
  bool isVerified = 8;
  
  string title = 9;
  string description = 10;
  string categoryId = 11;
  string categoryName = 12;
  
  double basePrice = 13;
  string priceUnit = 14;
  string currency = 15;
  
  repeated string coverageAreas = 16;
  
  repeated DayAvailability availability = 17;
  
  int32 yearsExperience = 18;
  double hourlyRate = 19;
  
  string status = 20;
  string expiresAt = 21;
  
  double averageRating = 22;
  int32 reviewCount = 23;
  
  string createdAt = 24;
  string updatedAt = 25;
  
  string vertical = 26;
  
  // ========== BOOKING FEE OVERRIDE FIELDS ==========
  bool useCustomBookingFee = 27;
  optional bool customBookingFeeEnabled = 28;
  optional double customBookingFeeAmount = 29;
  optional string customBookingFeeCurrency = 30;
  optional string customBookingFeeDescription = 31;
  optional bool customBookingFeeRefundable = 32;
  
  // ========== NEW: NEGOTIABLE PRICING FIELDS ==========
  bool isNegotiable = 33;
  optional double minNegotiablePrice = 34;
  optional double maxNegotiablePrice = 35;
}

// ===================================================
// REQUEST MESSAGES - SERVICE OFFERINGS
// ===================================================
message CreateServiceOfferingRequest {
  string creatorId = 1;
  string accountId = 2;
  string skilledProfessionalId = 3;
  string title = 4;
  string description = 5;
  string categoryId = 6;
  double basePrice = 7;
  string priceUnit = 8;
  string currency = 9;
  repeated string coverageAreas = 10;
  optional int32 yearsExperience = 11;
  optional string additionalNotes = 12;
  repeated DayAvailability availability = 13;
  
  // ========== BOOKING FEE OVERRIDE FIELDS ==========
  optional bool useCustomBookingFee = 14;
  optional bool customBookingFeeEnabled = 15;
  optional double customBookingFeeAmount = 16;
  optional string customBookingFeeCurrency = 17;
  optional string customBookingFeeDescription = 18;
  optional bool customBookingFeeRefundable = 19;
  
  // ========== NEW: NEGOTIABLE PRICING FIELDS ==========
  optional bool isNegotiable = 20;
  optional double minNegotiablePrice = 21;
  optional double maxNegotiablePrice = 22;
}

message GetOfferingsByVerticalRequest {
  string vertical = 1;
  optional string categoryId = 2;
  optional double minPrice = 3;
  optional double maxPrice = 4;
  optional double minRating = 5;
  optional bool isVerified = 6;
  optional string sortBy = 7;
  optional int32 limit = 8;
  optional int32 offset = 9;
}

message GetOfferingsByAccountRequest {
  string accountId = 1;
}

message GetOfferingsByProfessionalRequest {
  string professionalId = 1;
}

message GetOfferingByIdRequest {
  string id = 1;
}

message UpdateServiceOfferingRequest {
  string id = 1;
  optional string title = 2;
  optional string description = 3;
  optional double basePrice = 4;
  optional string priceUnit = 5;
  repeated string coverageAreas = 6;
  repeated DayAvailability availability = 7;
  string userId = 8;
  
  // ========== NEW: BOOKING FEE OVERRIDE FIELDS ==========
  optional bool useCustomBookingFee = 9;
  optional bool customBookingFeeEnabled = 10;
  optional double customBookingFeeAmount = 11;
  optional string customBookingFeeCurrency = 12;
  optional string customBookingFeeDescription = 13;
  optional bool customBookingFeeRefundable = 14;
}

message DeleteServiceOfferingRequest {
  string id = 1;
  string userId = 2;
}

message GetOfferingsByCategoryRequest {
  string categoryId = 1;
  optional int32 limit = 2;
  optional int32 offset = 3;
  optional double minPrice = 4;
  optional double maxPrice = 5;
}

// ===================================================
// RESPONSE MESSAGES - SERVICE OFFERINGS
// ===================================================
message BaseServiceOfferingResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  ServiceOffering data = 4; 
  ErrorPayload error = 5;
}

message ListServiceOfferingsResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  repeated ServiceOffering data = 4;
  PaginationInfo pagination = 5;
  ErrorPayload error = 6;
}

message PaginationInfo {
  int32 total = 1;
  int32 limit = 2;
  int32 offset = 3;
  bool hasMore = 4;
}
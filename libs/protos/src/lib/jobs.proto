  // ============================================================
  // APPLICATION & START TIMELINE
  // ============================================================
  optional string applicationDeadline = 33;
  optional string startDate = 34;
  bool startDateFlexible = 35;
  optional int32 maxApplications = 36;
  
  // ============================================================
  // PRIVACY & VISIBILITY
  // ============================================================
  bool isAnonymous = 37;
  optional string displayName = 38;
  optional string contactEmail = 39;
  
  // ============================================================
  // WORK DETAILS
  // ============================================================
  optional int32 hoursPerWeek = 40;
  optional int32 contractDuration = 41;
}

message UpdateJobPostRequest {
  string id = 1;
  string creatorId = 2;
  optional string accountId = 3;
  
  // Optional fields to update
  optional string title = 4;
  optional string description = 5;
  optional string status = 6;
  
  // Job Characteristics
  optional string employmentType = 7;
  optional string paymentType = 8;
  optional string workArrangement = 9;
  optional string commitment = 10;
  optional string workSchedule = 11;
  optional string documentationLevel = 12;
  optional string skillLevel = 13;
  optional string experienceLevel = 14;
  optional string educationLevel = 15;
  
  // Location
  optional string locationCity = 16;
  optional string locationNeighborhood = 17;
  optional bool isRemote = 18;
  
  // Compensation
  optional double payAmount = 19;
  optional string payRate = 20;
  optional bool isNegotiable = 21;
  
  // Requirements
  repeated string skills = 22;
  optional bool requiresDocuments = 23;
  optional bool requiresEquipment = 24;
  repeated string documentsNeeded = 25;
  repeated string equipmentRequired = 26;
  optional string additionalNotes = 27;
  
  // Referrals
  optional bool allowReferrals = 28;
  optional double referralBonus = 29;
  
  // Identity
  optional string creatorName = 30;
  optional string accountName = 31;
  
  // ============================================================
  // APPLICATION & START TIMELINE
  // ============================================================
  optional string applicationDeadline = 32;
  optional string startDate = 33;
  optional bool startDateFlexible = 34;
  optional int32 maxApplications = 35;
  
  // ============================================================
  // PRIVACY & VISIBILITY
  // ============================================================
  optional bool isAnonymous = 36;
  optional string displayName = 37;
  optional string contactEmail = 38;
  
  // ============================================================
  // WORK DETAILS
  // ============================================================
  optional int32 hoursPerWeek = 39;
  optional int32 contractDuration = 40;
}

message CloseJobPostRequest {
  string id = 1;
  string creatorId = 2;
  optional string accountId = 3;
  optional string reason = 4;
}

message CreateJobApplicationRequest {
  string jobPostId = 1;
  string applicantId = 2;
  bool hasRequiredEquipment = 3; 
  double expectedPay = 4;
  string availabilityDate = 5;
  string availabilityNotes = 6;
  string referrerName = 7;
  string referrerPhone = 8;
  string referrerEmail = 9;
  string referrerRelationship = 10;
  repeated Attachment attachments = 11;
}

// ===================================================
// GET JOB BY ID (WITH CACHE CONTROL)
// ===================================================
message GetJobPostByIdRequest {
  string id = 1;
  
  // ========== CACHE CONTROL FIELDS ==========
  optional bool bypassCache = 2;

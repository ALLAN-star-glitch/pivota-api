  string title = 1;
  string description = 2;
  string categoryId = 3;
  string subCategoryId = 4;
  
  // ============================================================
  // JOB CHARACTERISTICS (All 9 fields)
  // ============================================================
  string employmentType = 5;
  string paymentType = 6;
  string workArrangement = 7;
  string commitment = 8;
  string workSchedule = 9;
  string documentationLevel = 10;
  string skillLevel = 11;
  string experienceLevel = 12;
  string educationLevel = 13;
  
  // ============================================================
  // LOCATION
  // ============================================================
  string locationCity = 14;
  string locationNeighborhood = 15;
  bool isRemote = 16;
  
  // ============================================================
  // COMPENSATION
  // ============================================================
  double payAmount = 17;
  string payRate = 18;
  bool isNegotiable = 19;
  
  // ============================================================
  // REQUIREMENTS
  // ============================================================
  repeated string skills = 20;
  bool requiresDocuments = 21;
  bool requiresEquipment = 22;
  repeated string documentsNeeded = 23;
  repeated string equipmentRequired = 24;
  string additionalNotes = 25;
  
  // ============================================================
  // REFERRALS
  // ============================================================
  bool allowReferrals = 26;
  double referralBonus = 27;
  
  // ============================================================
  // IDENTITY & STATUS
  // ============================================================
  string status = 28;

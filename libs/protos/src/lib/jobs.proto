  // ========== PAGINATION ==========
  optional int32 limit = 3;
  optional int32 offset = 4;
  optional string sortBy = 5;
  
  // ========== CACHE CONTROL FIELDS ==========
  optional bool bypassCache = 6;
  optional bool skipCache = 7;
  optional bool refreshCache = 8;
  optional int32 cacheTTL = 9;

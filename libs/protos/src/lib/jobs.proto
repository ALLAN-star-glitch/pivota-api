  optional string documentationLevel = 13;
  optional string skillLevel = 14;
  optional string experienceLevel = 15;
  optional string educationLevel = 16;
  
  optional bool isRemote = 17;
  
  // ============================================================
  // NEW FILTERS
  // ============================================================
  optional bool isAnonymous = 18;
  optional string applicationDeadlineAfter = 19;

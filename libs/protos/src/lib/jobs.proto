// ===================================================
// VALIDATE JOB POST IDS
// ===================================================
message ValidateJobPostIdsRequest {
  repeated string ids = 1;
}

// ===================================================
// RESPONSE MESSAGES
// ===================================================
message ListJobApplicationsResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  repeated JobApplication data = 4;
  ErrorPayload error = 5;
}

message JobPostCreateData {
  string id = 1;
  string status = 2;
  string createdAt = 3;
}

message BaseJobPostCreateResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  JobPostCreateData data = 4;
  ErrorPayload error = 5;
}

message BaseJobPostResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  JobPost data = 4; 
  ErrorPayload error = 5;
}

message ListJobPostsResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  repeated JobPost data = 4;
  PaginationInfo pagination = 5;
  ErrorPayload error = 6;
}

message CloseJobPostData {
  string id = 1;
  string status = 2;
  bool isClosed = 3;
  string closedAt = 4;
}

message BaseCloseJobPostResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  CloseJobPostData data = 4;
  ErrorPayload error = 5;
}

message BaseJobApplicationResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  JobApplication data = 4;
  ErrorPayload error = 5;
}

message ValidateJobIdsData {
   repeated string validIds = 1;
   repeated string invalidIds = 2;
}

message BaseValidateJobPostIdsResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  ValidateJobIdsData data = 4;
  ErrorPayload error = 5;
}
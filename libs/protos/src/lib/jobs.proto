syntax = "proto3";

package jobs;

// ===================================================
// SERVICE DEFINITION
// ===================================================
service JobsService {  
  // --- Creation Flows ---
  rpc CreateJobPost (CreateJobPostRequest) returns (BaseJobPostCreateResponse);
  rpc CreateAdminJobPost (CreateJobPostRequest) returns (BaseJobPostCreateResponse);
  
  // --- Discovery Flows (WITH CACHE CONTROL) ---
  rpc GetJobPostById (GetJobPostByIdRequest) returns (BaseJobPostResponse);
  rpc GetJobsByCategory (GetJobsByCategoryRequest) returns (ListJobPostsResponse);
  rpc GetAllJobs (GetAllJobsRequest) returns (ListJobPostsResponse);
  rpc ValidateJobPostIds(ValidateJobPostIdsRequest) returns (BaseValidateJobPostIdsResponse);
  
  // --- NEW: Get Job Listings by Owner ---
  rpc GetJobListingsByOwner (GetJobListingsByOwnerRequest) returns (ListJobPostsResponse);
  
  // --- Update Flows ---
  rpc UpdateJobPost (UpdateJobPostRequest) returns (BaseJobPostResponse);
  rpc UpdateAdminJobPost (UpdateJobPostRequest) returns (BaseJobPostResponse);
  
  // --- Closure Flows ---
  rpc CloseJobPost (CloseJobPostRequest) returns (BaseCloseJobPostResponse);
  rpc CloseAdminJobPost (CloseJobPostRequest) returns (BaseCloseJobPostResponse);
  
  // --- Application Flows ---
  rpc ApplyToJobPost (CreateJobApplicationRequest) returns (BaseJobApplicationResponse);
  rpc GetOwnApplications (GetOwnApplicationsRequest) returns (ListJobApplicationsResponse);
  rpc GetAdminApplications (GetAdminApplicationsRequest) returns (ListJobApplicationsResponse);
  rpc GetApplicationById (GetApplicationByIdRequest) returns (BaseJobApplicationResponse);

  // --- Ownership & Management ---
  rpc GetOwnJobs (GetOwnJobsRequest) returns (ListJobPostsResponse);
  rpc GetAdminJobs (GetAdminJobsRequest) returns (ListJobPostsResponse);
}

// ===================================================
// SHARED PAYLOADS
// ===================================================
message ErrorPayload {
  string code = 1;
  string message = 2;
  string details = 3;
}

message UserBasic {
  string id = 1;
  string fullName = 2;
  string email = 3;
}

message AccountBasic {
  string id = 1;
  string name = 2;
}

message CategoryBasic {
  string id = 1;
  string name = 2;
}

// ===================================================
// PAGINATION
// ===================================================
message PaginationInfo {
  int32 total = 1;
  int32 limit = 2;
  int32 offset = 3;
  bool hasMore = 4;
}

// ===================================================
// JOB APPLICATION ENTITIES
// ===================================================
message Attachment {
  string id = 1;
  string type = 2;
  string fileUrl = 3;
  string fileName = 4;
  string contentText = 5;
  bool isPrimary = 6;
}

message StatusHistory {
  string id = 1;
  string oldStatus = 2;
  string newStatus = 3;
  string changedBy = 4;
  string reason = 5;
  string createdAt = 6;
}

message JobApplication {
  string id = 1;
  optional string externalId = 2;
  string jobPostId = 3;
  string applicantId = 4;
  string employerId = 5;
  string status = 6;
  double expectedPay = 7;
  string availabilityDate = 8;
  string availabilityNotes = 9;
  string referrerName = 10;
  string referrerPhone = 11;
  string referrerEmail = 12; 
  string referrerRelationship = 13;
  string createdAt = 14;
  string updatedAt = 15;
  optional string reviewedAt = 16;
  repeated Attachment attachments = 17;
  repeated StatusHistory statusHistory = 18;
  optional string lastStatusChangeReason = 19;
}

// ===================================================
// JOB POST ENTITY (With all fields)
// ===================================================
message JobPost {
  string id = 1;
  string title = 2;
  string description = 3;
  CategoryBasic category = 4;
  CategoryBasic subCategory = 5;
  UserBasic creator = 6;
  AccountBasic account = 7;
  
  // ============================================================
  // JOB CHARACTERISTICS (All 9 fields)
  // ============================================================
  string employmentType = 8;
  string paymentType = 9;
  string workArrangement = 10;
  string commitment = 11;
  string workSchedule = 12;
  string documentationLevel = 13;
  string skillLevel = 14;
  string experienceLevel = 15;
  string educationLevel = 16;
  
  // ============================================================
  // LOCATION
  // ============================================================
  string locationCity = 17;
  string locationNeighborhood = 18;
  bool isRemote = 19;
  
  // ============================================================
  // COMPENSATION
  // ============================================================
  double payAmount = 20;
  string payRate = 21;
  bool isNegotiable = 22;
  
  // ============================================================
  // REQUIREMENTS
  // ============================================================
  repeated string skills = 23;
  bool requiresDocuments = 24;
  bool requiresEquipment = 25;
  repeated string documentsNeeded = 26;
  repeated string equipmentRequired = 27;
  string additionalNotes = 28;
  
  // ============================================================
  // REFERRALS
  // ============================================================
  bool allowReferrals = 29;
  double referralBonus = 30;
  
  // ============================================================
  // STATUS & TIMESTAMPS
  // ============================================================
  string status = 31;
  int32 applicationsCount = 32;
  string createdAt = 33;
  string updatedAt = 34;
  
  // ============================================================
  // APPLICATION & START TIMELINE
  // ============================================================
  optional string applicationDeadline = 35;
  optional string startDate = 36;
  bool startDateFlexible = 37;
  optional int32 maxApplications = 38;
  
  // ============================================================
  // PRIVACY & VISIBILITY
  // ============================================================
  bool isAnonymous = 39;
  optional string displayName = 40;
  optional string contactEmail = 41;
  
  // ============================================================
  // WORK DETAILS
  // ============================================================
  optional int32 hoursPerWeek = 42;
  optional int32 contractDuration = 43;
  
  // ============================================================
  // ANALYTICS
  // ============================================================
  int32 viewCount = 44;
  int32 shareCount = 45;
}

// ===================================================
// REQUEST MESSAGES - APPLICATIONS
// ===================================================
message GetOwnApplicationsRequest {
  string applicantId = 1;
  optional string status = 2;
}

message GetAdminApplicationsRequest {
  optional string applicantId = 1;
  optional string employerId = 2;
  optional string status = 3;
}

message GetApplicationByIdRequest {
  string id = 1;
  string requesterId = 2;
  optional string requesterRole = 3;
}

// ===================================================
// REQUEST MESSAGES - JOB POSTS (WITH CACHE CONTROL)
// ===================================================

message CreateJobPostRequest {

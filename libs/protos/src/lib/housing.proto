syntax = "proto3";

package housing;

// ===================================================
// SERVICE DEFINITION
// ===================================================
service HousingService {
  // Core Listings
  rpc CreateHouseListing (CreateHouseListingRequest) returns (BaseHouseListingCreateResponse);
  rpc CreateAdminHouseListing (CreateHouseListingRequest) returns (BaseHouseListingCreateResponse);
  
  // ===================================================
  // READ METHODS (WITH CACHE CONTROL)
  // ===================================================
  rpc GetHouseListingById (GetHouseListingByIdRequest) returns (BaseHouseListingResponse);
  rpc GetListingsByOwner (GetListingsByOwnerRequest) returns (ListHouseListingsResponse);
  rpc GetAdminListings (GetAdminListingsRequest) returns (ListHouseListingsResponse);
  rpc SearchListings (SearchHouseListingsRequest) returns (ListHouseListingsResponse);
  
  // ===================================================
  // NEW: GET HOUSE LISTINGS BY CATEGORY (WITH CACHE CONTROL)
  // ===================================================
  rpc GetHouseListingsByCategory (GetHouseListingsByCategoryRequest) returns (ListHouseListingsResponse);

  // Lifecycle & Management
  rpc UpdateHouseListing (UpdateHouseListingRequest) returns (BaseHouseListingResponse);
  rpc UpdateAdminHouseListing (UpdateHouseListingRequest) returns (BaseHouseListingResponse);
  rpc UpdateListingStatus (UpdateHouseListingStatusRequest) returns (BaseHouseListingResponse);
  rpc ArchiveHouseListing (ArchiveHouseListingRequest) returns (BaseEmptyResponse);

  // Viewings
  rpc ScheduleViewing (ScheduleViewingRequest) returns (BaseHouseViewingResponse);
  
  // Admin Viewings
  rpc ScheduleAdminViewing (ScheduleAdminViewingRequest) returns (BaseHouseViewingResponse);

  rpc GetAllHouseListings (GetAllHouseListingsRequest) returns (ListHouseListingsResponse);
}

message GetAllHouseListingsRequest {
  optional int32 limit = 1;
  optional int32 offset = 2;
  optional string city = 3;
  optional string listingType = 4;
  optional double minPrice = 5;
  optional double maxPrice = 6;
  optional int32 bedrooms = 7;
  optional string propertyType = 8;
  optional bool isFurnished = 9;
  optional string sortBy = 10;
  
  // ========== CACHE CONTROL ==========
  optional bool bypassCache = 11;
  optional bool skipCache = 12;
  optional bool refreshCache = 13;
  optional int32 cacheTTL = 14;
  optional bool readOnly = 15;
}

// ===================================================
// SHARED PAYLOADS
// ===================================================
message ErrorPayload {
  string code = 1;
  string message = 2;
  string details = 3;
}

message UserBasic {
  string id = 1;
  string fullName = 2;
  string phone = 3;
  string email = 4;
}

message AccountBasic {
  string id = 1;
  string name = 2;
  string email = 3;
}

message CategoryBasic {
  string id = 1;
  string name = 2;
  string slug = 3;
  string vertical = 4;
}

message HouseImage {
  string id = 1;
  string url = 2;
  bool isMain = 3;
}

// ===================================================
// PAGINATION
// ===================================================
message PaginationInfo {
  int32 total = 1;
  int32 limit = 2;
  int32 offset = 3;
  bool hasMore = 4;
}

// ===================================================
// ANALYTICS CONTEXT MESSAGES
// ===================================================

message ClientInfo {
  string ipAddress = 1;
  string userAgent = 2;
  string device = 3;
  string deviceType = 4;
  string os = 5;
  string osVersion = 6;
  string browser = 7;
  string browserVersion = 8;
  bool isMobile = 9;
  bool isTablet = 10;
  bool isDesktop = 11;
  bool isBot = 12;
}

message SearchContext {
  optional string searchId = 1;
  optional string query = 2;
  optional int32 position = 3;
  optional string filters = 4;
}

message ListingViewContext {
  optional string seekerId = 1;
  string sessionId = 2;
  ClientInfo client = 3;
  string platform = 4;
  string referrer = 5;
  optional SearchContext search = 6;
  optional int32 timeSpent = 7;
  optional string interactionType = 8;
  optional int32 viewDuration = 9;
  optional int32 scrollDepth = 10;
}

// ===================================================
// ADMIN METADATA
// ===================================================
message AdminMetadata {
  optional string ipAddress = 1;
  optional string userAgent = 2;
  string scheduledAt = 3;
  bool isAdminBooking = 4;
}

// ===================================================
// ENTITIES
// ===================================================
message HouseListing {
  string id = 1;
  string externalId = 2;
  string title = 3;
  string description = 4;
  string listingType = 5;
  double price = 6;
  string currency = 7;
  int32 bedrooms = 8;
  int32 bathrooms = 9;
  repeated string amenities = 10;
  bool isFurnished = 11;
  string locationCity = 12;
  string locationNeighborhood = 13;
  string address = 14;
  string status = 15;
  string createdAt = 16;
  string updatedAt = 17;
  string imageUrl = 18; 
  CategoryBasic category = 19;
  UserBasic creator = 20;
  AccountBasic account = 21;
  repeated HouseImage images = 22;
  string accountName = 23;
  optional double latitude = 24;
  optional double longitude = 25;
  string ownerEmail = 26;
  string listingCreatorId = 27;
  
  optional int32 minimumLeaseTerm = 28;
  optional int32 maximumLeaseTerm = 29;
  optional double depositAmount = 30;
  optional bool isPetFriendly = 31;
  optional bool utilitiesIncluded = 32;
  optional string utilitiesDetails = 33;
  optional bool isNegotiable = 34;
  optional bool titleDeedAvailable = 35;
  optional int32 squareFootage = 36;
  optional int32 yearBuilt = 37;
  optional string propertyType = 38;
}

message HouseViewing {
  string id = 1;
  string houseId = 2;
  string seekerId = 3;
  string seekerEmail = 4;
  string seekerName = 5;
  string viewingDate = 6;
  string status = 7;
  string notes = 8;
  string createdAt = 9;
  string updatedAt = 10;
  string schedulerId = 11;
  string schedulerEmail = 12;
  string schedulerName = 13;
}

// ===================================================
// REQUEST MESSAGES
// ===================================================

message CreateHouseListingRequest {
  string creatorId = 1;
  string accountId = 2;
  string creatorName = 3;
  string accountName = 4;
  string title = 5;
  string description = 6;
  string categoryId = 7;
  string listingType = 8;
  double price = 9;
  string currency = 10;
  int32 bedrooms = 11;
  int32 bathrooms = 12;
  repeated string amenities = 13;
  bool isFurnished = 14;
  string locationCity = 15;
  string locationNeighborhood = 16;
  string address = 17;
  repeated string imageUrls = 18;
  optional double latitude = 19;
  optional double longitude = 20;
  string ownerEmail = 21;
  optional ClientInfo clientInfo = 22;
  optional int32 minimumLeaseTerm = 23;
  optional int32 maximumLeaseTerm = 24;
  optional double depositAmount = 25;
  optional bool isPetFriendly = 26;
  optional bool utilitiesIncluded = 27;
  optional string utilitiesDetails = 28;
  optional bool isNegotiable = 29;
  optional bool titleDeedAvailable = 30;
  optional int32 squareFootage = 31;
  optional int32 yearBuilt = 32;
  optional string propertyType = 33;
}

// ===================================================
// SEARCH LISTINGS (WITH CACHE CONTROL)
// ===================================================
message SearchHouseListingsRequest {
  optional string city = 1;
  optional string listingType = 2;
  optional double minPrice = 3;
  optional double maxPrice = 4;
  optional int32 bedrooms = 5;
  optional int32 limit = 6;
  optional int32 offset = 7;
  optional string categoryId = 8;
  optional string subCategoryId = 9;
  optional int32 minSquareFootage = 10;
  optional int32 maxSquareFootage = 11;
  optional string propertyType = 12;
  optional int32 minYearBuilt = 13;
  optional bool isFurnished = 14;
  repeated string amenities = 15;
  optional int32 minLeaseTerm = 16;
  optional bool isPetFriendly = 17;
  optional bool utilitiesIncluded = 18;
  optional bool isNegotiable = 19;
  optional bool titleDeedAvailable = 20;
  optional string sortBy = 21;  // "recent", "price_asc", "price_desc"
  
  // ========== CACHE CONTROL FIELDS ==========
  optional bool bypassCache = 22;     // Skip cache entirely (admin only)
  optional bool skipCache = 23;       // Don't read cache, still write
  optional bool refreshCache = 24;    // Force refresh cache
  optional int32 cacheTTL = 25;       // Override TTL (seconds)
  optional bool readOnly = 26;        // Don't write to cache
}

// ===================================================
// GET HOUSE LISTINGS BY CATEGORY (WITH CACHE CONTROL)
// ===================================================
message GetHouseListingsByCategoryRequest {
  string categoryId = 1;
  optional string city = 2;
  optional string listingType = 3;
  optional double minPrice = 4;
  optional double maxPrice = 5;
  optional int32 bedrooms = 6;
  optional string propertyType = 7;
  optional bool isFurnished = 8;
  optional int32 limit = 9;
  optional int32 offset = 10;
  
  // ========== CACHE CONTROL FIELDS ==========
  optional bool bypassCache = 11;     // Skip cache entirely (admin only)
  optional bool skipCache = 12;       // Don't read cache, still write
  optional bool refreshCache = 13;    // Force refresh cache
  optional int32 cacheTTL = 14;       // Override TTL (seconds)
  optional bool readOnly = 15;        // Don't write to cache
}

// ===================================================
// GET LISTINGS BY OWNER (WITH CACHE CONTROL & PAGINATION)
// ===================================================
message GetListingsByOwnerRequest {
  string ownerId = 1;
  optional string status = 2;
  
  // ========== PAGINATION ==========
  optional int32 limit = 8;        // Results per page (default: 20, max: 100)
  optional int32 offset = 9;       // Pagination offset
  optional string sortBy = 10;     // Sort order: "recent", "price_asc", "price_desc"
  
  // ========== CACHE CONTROL FIELDS ==========
  optional bool bypassCache = 3;      // Skip cache entirely (admin only)
  optional bool skipCache = 4;        // Don't read cache, still write
  optional bool refreshCache = 5;     // Force refresh cache
  optional int32 cacheTTL = 6;        // Override TTL (seconds)
  optional bool readOnly = 7;         // Don't write to cache
}

// ===================================================
// GET HOUSE LISTING BY ID (WITH CACHE CONTROL)
// ===================================================
message GetHouseListingByIdRequest {
  string id = 1;
  optional ListingViewContext context = 2;
  
  // ========== CACHE CONTROL FIELDS ==========
  optional bool bypassCache = 3;      // Skip cache entirely (admin only)
  optional bool refreshCache = 4;     // Force refresh cache
  optional int32 cacheTTL = 5;        // Override TTL (seconds)
  optional bool readOnly = 6;         // Don't write to cache
}

// ===================================================
// GET ADMIN LISTINGS (WITH PAGINATION)
// ===================================================
message GetAdminListingsRequest {
  optional string status = 1;
  optional string accountId = 2;
  optional string creatorId = 3;
  optional string listingType = 4;
  optional string propertyType = 5;
  optional int32 minBedrooms = 6;
  optional double minPrice = 7;
  optional double maxPrice = 8;
  
  // ========== PAGINATION ==========
  optional int32 limit = 9;        // Results per page (default: 20, max: 100)
  optional int32 offset = 10;      // Pagination offset
  
  // ========== CACHE CONTROL ==========
  // (Add if you want cache control for admin endpoints)
  // optional bool bypassCache = 11;
  // optional bool skipCache = 12;
  // optional bool refreshCache = 13;
  // optional int32 cacheTTL = 14;
  // optional bool readOnly = 15;
}

message UpdateHouseListingRequest {
  string listingId = 1;
  string callerId = 2;
  string userRole = 3;
  optional string accountId = 4;
  UpdateHouseListingData data = 5;
}

message UpdateHouseListingData {
  optional string title = 1;
  optional string description = 2;
  optional double price = 3;
  optional int32 bedrooms = 4;
  optional int32 bathrooms = 5;
  optional bool isFurnished = 6;
  repeated string amenities = 7;
  optional string locationCity = 8;
  optional string locationNeighborhood = 9;
  optional string address = 10;
  optional string status = 11;
  optional string creatorId = 12;
  optional string accountId = 13;
  optional double latitude = 14;
  optional double longitude = 15;
  optional string ownerEmail = 16;
  optional int32 minimumLeaseTerm = 17;
  optional int32 maximumLeaseTerm = 18;
  optional double depositAmount = 19;
  optional bool isPetFriendly = 20;
  optional bool utilitiesIncluded = 21;
  optional string utilitiesDetails = 22;
  optional bool isNegotiable = 23;
  optional bool titleDeedAvailable = 24;
  optional int32 squareFootage = 25;
  optional int32 yearBuilt = 26;
  optional string propertyType = 27;
}

message UpdateHouseListingStatusRequest {
  string id = 1;
  string ownerId = 2;
  string status = 3;
}

message ArchiveHouseListingRequest {
  string id = 1;
  string ownerId = 2;
}

// ===================================================
// VIEWING REQUESTS
// ===================================================
message ScheduleViewingRequest {
  string houseId = 1;
  string seekerId = 2;
  string seekerEmail = 3;
  string seekerName = 4;
  string userRole = 5;
  string viewingDate = 6;
  optional string notes = 7;
  optional ListingViewContext context = 8;
}

message ScheduleAdminViewingRequest {
  string houseId = 1;
  string schedulerId = 2;
  string schedulerEmail = 3;
  string schedulerName = 4;
  string userRole = 5;
  string viewingDate = 6;
  string seekerId = 7;
  string seekerEmail = 8;
  string seekerName = 9;
  optional string notes = 10;
  optional AdminMetadata adminMetadata = 11;
}

// ===================================================
// RESPONSE MESSAGES
// ===================================================

message HouseListingCreateData {
  string id = 1;
  string status = 2;
  string createdAt = 3;
} 

message BaseHouseListingCreateResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  HouseListingCreateData data = 4;
  ErrorPayload error = 5;
}

message BaseHouseListingResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  HouseListing data = 4;
  ErrorPayload error = 5;
}

message ListHouseListingsResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  repeated HouseListing data = 4;
  PaginationInfo pagination = 5;  // ← ADDED
  ErrorPayload error = 6;
}

message BaseHouseViewingResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  HouseViewing data = 4;
  ErrorPayload error = 5;
}

message BaseEmptyResponse {
  bool success = 1;
  string code = 2;
  string message = 3;
  ErrorPayload error = 4;
}
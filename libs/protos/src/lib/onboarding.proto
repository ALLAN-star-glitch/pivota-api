syntax = "proto3";

package onboarding;

// ======================================================
// ONBOARDING SERVICE
// ======================================================
service Onboarding {
  // Individual Signup
  rpc Signup(SignupRequest) returns (SignupResponse);
  
  // Organization Signup
  rpc OrganisationSignup(OrganisationSignupRequest) returns (OrganisationSignupResponse);
}

// ======================================================
// SHARED MESSAGES
// ======================================================

// ------------------ Client Info ------------------

message ClientInfo {
  string device = 1;
  string deviceType = 2;
  string ipAddress = 3;
  string userAgent = 4;
  string os = 5;
  string osVersion = 6;
  string browser = 7;
  string browserVersion = 8;
  bool isMobile = 9;
  bool isTablet = 10;
  bool isDesktop = 11;
  bool isBot = 12;
  string timestamp = 13;
}

// ------------------ Error Payload ------------------

message ErrorPayload {
  string message = 1;
  string code = 2;
  string details = 3;  
}

// ------------------ Base Responses ------------------

message BaseResponse {
  bool success = 1;
  string message = 2;
  string code = 3;
}

// ------------------ Signup Data ------------------

message SignupSuccessData {
  string message = 1;
  optional string accessToken = 2;
  optional string refreshToken = 3;
  optional string redirectTo = 4;
  optional string redirectUrl = 5;       // Payment URL for premium plans
  optional string merchantReference = 6;
}

message OrganisationSignupSuccessData {
  string message = 1;
  optional string redirectUrl = 2;
  optional string merchantReference = 3;
}

// ======================================================
// PROFILE DATA TYPES
// ======================================================

// ------------------ Individual Profile Data ------------------

message JobSeekerProfileData {
  optional string headline = 1;
  optional bool isActivelySeeking = 2;
  repeated string skills = 3;
  repeated string industries = 4;
  repeated string jobTypes = 5;
  optional string seniorityLevel = 6;
  optional string noticePeriod = 7;
  optional double expectedSalary = 8;
  repeated string workAuthorization = 9;
  optional string cvUrl = 10;
  repeated string portfolioImages = 11;
  optional string linkedInUrl = 12;
  optional string githubUrl = 13;
  optional string portfolioUrl = 14;
  optional bool hasAgent = 15;
  optional string agentUuid = 16;
}

message SkilledProfessionalProfileData {
  optional string title = 1;
  optional string profession = 2;
  repeated string specialties = 3;
  repeated string serviceAreas = 4;
  optional int32 yearsExperience = 5;
  optional string licenseNumber = 6;
  optional string insuranceInfo = 7;
  optional double hourlyRate = 8;
  optional double dailyRate = 9;
  optional string paymentTerms = 10;
  optional bool availableToday = 11;
  optional bool availableWeekends = 12;
  optional bool emergencyService = 13;
  repeated string portfolioImages = 14;
  repeated string certifications = 15;
}

message IntermediaryAgentProfileData {
  string agentType = 1;
  repeated string specializations = 2;
  repeated string serviceAreas = 3;
  optional string licenseNumber = 4;
  optional string licenseBody = 5;
  optional int32 yearsExperience = 6;
  optional string agencyName = 7;
  optional string agencyUuid = 8;
  optional double commissionRate = 9;
  optional string feeStructure = 10;
  optional double minimumFee = 11;
  optional string typicalFee = 12;
  optional string about = 13;
  optional string profileImage = 14;
  optional string contactEmail = 15;
  optional string contactPhone = 16;
  optional string website = 17;
  map<string, string> socialLinks = 18;
  repeated string clientTypes = 19;
}

message HousingSeekerProfileData {
  optional int32 minBedrooms = 1;
  optional int32 maxBedrooms = 2;
  optional double minBudget = 3;
  optional double maxBudget = 4;
  repeated string preferredTypes = 5;
  repeated string preferredCities = 6;
  repeated string preferredNeighborhoods = 7;
  optional string moveInDate = 8;
  optional string leaseDuration = 9;
  optional int32 householdSize = 10;
  optional bool hasPets = 11;
  optional string petDetails = 12;
  optional double latitude = 13;
  optional double longitude = 14;
  optional int32 searchRadiusKm = 15;
  optional bool hasAgent = 16;
  optional string agentUuid = 17;
  optional string searchType = 18;
  optional bool isLookingForRental = 19;
  optional bool isLookingToBuy = 20;
  optional int32 minimumLeaseTerm = 21;
  optional int32 maximumLeaseTerm = 22;
  optional double depositAmount = 23;
  optional bool isPetFriendly = 24;
  optional bool utilitiesIncluded = 25;
  optional string utilitiesDetails = 26;
  optional bool isNegotiable = 27;
  optional bool titleDeedAvailable = 28;
}

message SupportBeneficiaryProfileData {
  repeated string needs = 1;
  repeated string urgentNeeds = 2;
  optional int32 familySize = 3;
  optional int32 dependents = 4;
  optional string householdComposition = 5;
  repeated string vulnerabilityFactors = 6;
  optional string city = 7;
  optional string neighborhood = 8;
  optional double latitude = 9;
  optional double longitude = 10;
  optional string landmark = 11;
  optional bool prefersAnonymity = 12;
  repeated string languagePreference = 13;
  optional bool consentToShare = 14;
  optional string referredBy = 15;
  optional string referredByUuid = 16;
  optional string caseWorkerUuid = 17;
}

message PropertyOwnerProfileData {
  optional bool isProfessional = 1;
  optional string licenseNumber = 2;
  optional string companyName = 3;
  optional int32 yearsInBusiness = 4;
  repeated string preferredPropertyTypes = 5;
  repeated string serviceAreas = 6;
  optional bool usesAgent = 7;
  optional string managingAgentUuid = 8;
  optional int32 propertyCount = 9;
  repeated string propertyTypes = 10;
  optional string propertyPurpose = 11;
  optional string listingType = 12;
  optional bool isListingForRent = 13;
  optional bool isListingForSale = 14;
}

message EmployerProfileData {
  optional string companyName = 1;
  optional string industry = 2;
  optional string companySize = 3;
  optional int32 foundedYear = 4;
  optional string description = 5;
  optional string logo = 6;
  repeated string preferredSkills = 7;
  optional string remotePolicy = 8;
  optional bool worksWithAgents = 9;
  repeated string preferredAgents = 10;
  optional string businessName = 11;
  optional bool isRegistered = 12;
  optional int32 yearsExperience = 13;
}

message SocialServiceProviderProfileData {
  string providerType = 1;
  repeated string servicesOffered = 2;
  repeated string targetBeneficiaries = 3;
  repeated string serviceAreas = 4;
  optional string about = 5;
  optional string website = 6;
  optional string contactEmail = 7;
  optional string contactPhone = 8;
  optional string officeHours = 9;
  optional string physicalAddress = 10;
  optional int32 peopleServed = 11;
  optional int32 yearEstablished = 12;
  optional bool acceptsDonations = 13;
  optional bool needsVolunteers = 14;
  optional string donationInfo = 15;
  optional string volunteerNeeds = 16;
  optional string operatingName = 17;
  optional int32 yearsExperience = 18;
  repeated string qualifications = 19;
  optional string availability = 20;
}

// ======================================================
// REQUEST MESSAGES
// ======================================================

message SignupRequest {
  string firstName = 1;
  string lastName = 2;
  string email = 3;
  string password = 4;
  string phone = 5;
  string planSlug = 6;
  string code = 7;
  ClientInfo clientInfo = 8;
  optional string profileImage = 9;
  string primaryPurpose = 10;
  
  oneof profileData {
    JobSeekerProfileData jobSeekerData = 11;
    SkilledProfessionalProfileData skilledProfessionalData = 12;
    IntermediaryAgentProfileData intermediaryAgentData = 13;
    HousingSeekerProfileData housingSeekerData = 14;
    SupportBeneficiaryProfileData supportBeneficiaryData = 15;
    EmployerProfileData employerData = 16;
    PropertyOwnerProfileData propertyOwnerData = 17;
  }
}

message OrganisationSignupRequest {
  string name = 1;
  string officialEmail = 2;
  string officialPhone = 3;
  string physicalAddress = 4;
  string organizationType = 5;
  string email = 6;
  string password = 7;
  string phone = 8;
  string adminFirstName = 9;
  string adminLastName = 10;
  string code = 11;
  string planSlug = 12;
  ClientInfo clientInfo = 13;
  optional string registrationNo = 14;
  optional string kraPin = 15;
  optional string website = 16;
  optional string about = 17;
  optional string logo = 18;
  repeated string purposes = 19;
  map<string, OrganizationProfileDataEntry> profileData = 20;
}

message OrganizationProfileDataEntry {
  oneof data {
    EmployerProfileData employerData = 1;
    PropertyOwnerProfileData propertyOwnerData = 2;
    SkilledProfessionalProfileData skilledProfessionalData = 3;
    SocialServiceProviderProfileData socialServiceProviderData = 4;
    IntermediaryAgentProfileData intermediaryAgentData = 5;
  }
}

// ======================================================
// RESPONSE MESSAGES
// ======================================================

message SignupResponse {
  bool success = 1;
  string message = 2;
  string code = 3;
  optional SignupSuccessData data = 4;
  ErrorPayload error = 5;
}

message OrganisationSignupResponse {
  bool success = 1;
  string message = 2;
  string code = 3;
  optional OrganisationSignupSuccessData data = 4;
  ErrorPayload error = 5;
}